name: Deploy Staging

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows:
      - Release
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  id-token: write

jobs:
  check-release:
    name: Check release
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref_name }}
          fetch-depth: 1
      - name: Check commit message
        run: |
          echo "Event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "Checking workflow_run event"
            MESSAGE=$(git log -1 --format=%s)
            echo "Commit message: $MESSAGE"
            if echo "$MESSAGE" | grep -q "chore(release):"; then
              echo "Found release tag in message"
              echo "is_release=true" >> $GITHUB_OUTPUT
            else
              echo "No release tag found"
              echo "is_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Not workflow_run, setting is_release=true"
            echo "is_release=true" >> $GITHUB_OUTPUT
          fi
        id: check

  lint:
    name: Lint
    needs: [check-release]
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  build:
    name: Build
    needs: [check-release]
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  test:
    name: Test
    needs: [check-release]
    if: needs.check-release.outputs.is_release == 'true'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy-staging:
    name: Deploy staging
    needs: [build, test, lint]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      message: ${{ github.ref_name }}

  deploy-prod-preview:
    name: Deploy production preview
    needs: [deploy-staging]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production-preview
      message: ${{ github.ref_name }}

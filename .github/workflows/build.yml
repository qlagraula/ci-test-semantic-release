name: Build

env:
  NODE_VERSION: '24'

on:
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: showroomtech/gh-actions-catalog/node/setup@v1.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: pnpm turbo build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: dist/

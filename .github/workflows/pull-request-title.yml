name: Semantic Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  semantic-pull-request:
    name: Validate PR title
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  preview-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Simulate squash commit + dry-run
        id: sr
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.ref }}"
          TITLE="${{ github.event.pull_request.title }}"
          BODY="${{ github.event.pull_request.body }}"
          git fetch origin "$BASE" --tags
          git checkout -B "$BASE" "origin/$BASE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Simule le commit squash final (titre PR + body)
          git commit --allow-empty -m "$TITLE" -m "${BODY:-}"
          OUT="$(npx semantic-release --dry-run --no-ci --branches "$BASE" 2>&1 || true)"
          echo "$OUT"
          NEXT="$(echo "$OUT" | sed -n 's/.*The next release version is \([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p' | tail -1)"
          if [ -z "$NEXT" ]; then
            echo "comment=🔎 Aucune release détectée pour ce titre de PR." >> "$GITHUB_OUTPUT"
          else
            echo "comment=🚀 Version prévue si merge squash maintenant: \`$NEXT\`" >> "$GITHUB_OUTPUT"
          fi
      - name: Upsert PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: semantic-release-preview
          message: ${{ steps.sr.outputs.comment }}

name: Semantic Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

env:
  NODE_VERSION: '24'

permissions:
  contents: write
  pull-requests: write

jobs:
  semantic-pull-request:
    name: Validate PR title
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  preview-version:
    name: Preview next release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic Release Dry-Run
        id: dry-run
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.ref }}"
          TITLE="${{ github.event.pull_request.title }}"
          BODY="${{ github.event.pull_request.body }}"

          git fetch origin "$BASE" --tags
          git checkout -B "$BASE" "origin/$BASE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "$TITLE" -m "${BODY:-}"

          OUT="$(
            GITHUB_REF="refs/heads/$BASE" \
            GITHUB_REF_NAME="$BASE" \
            GITHUB_HEAD_REF="" \
            GITHUB_BASE_REF="" \
            pnpm semantic-release --dry-run --no-ci --branches "$BASE" 2>&1 || true
          )"

          NEXT="$(echo "$OUT" | sed -n 's/.*The next release version is \([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p' | tail -1)"
          NOTES="$(
            printf '%s\n' "$OUT" | awk '
              /Release note for version [0-9]+\.[0-9]+\.[0-9]+:/ {capture=1; next}
              capture && /^\[[0-9]{1,2}:[0-9]{2}:[0-9]{2}/ {capture=0}
              capture {print}
            '
          )"
          CLEAN_NOTES="$(
            printf '%s\n' "$NOTES" \
              | sed -E '/^# [0-9]+\.[0-9]+\.[0-9]+/d' \
              | sed -E 's/^[[:space:]]+\* /- /' \
              | sed -E 's/[[:space:]]+$//' \
              | awk 'BEGIN{blank=0} {if ($0=="") {if (blank==0) print; blank=1} else {print; blank=0}}'
          )"

          if [ -z "$NEXT" ]; then
            echo "comment=🔎 Aucune release détectée pour ce titre de PR." >> "$GITHUB_OUTPUT"
          else
            {
              echo "comment<<EOF"
              printf '🚀 Version prévue si merge squash : `%s`\n' "$NEXT"
              if [ -n "$CLEAN_NOTES" ]; then
                echo
                echo "### Changelog preview"
                printf '%s\n' "$CLEAN_NOTES"
              fi
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Upsert PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          recreate: true
          header: semantic-release-preview
          message: ${{ steps.dry-run.outputs.comment }}
